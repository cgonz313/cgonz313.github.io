name: Fetch Instagram Posts

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Instaloader
        run: pip install instaloader

      - name: Fetch last 12 posts
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: |
          mkdir -p instagram
          instaloader --login "$IG_USERNAME" --password "$IG_PASSWORD" \
            --no-videos --no-metadata-json --no-captions \
            --count 12 --dirname-pattern instagram \
            --filename-pattern "{date_utc:%Y%m%d}_{mediaid}" \
            -- cgonz313
          # Remove any non-image files
          find instagram -type f ! -name "*.jpg" ! -name "*.png" ! -name "*.webp" -delete

      - name: Build posts JSON
        run: |
          python3 - <<'EOF'
          import os, json, glob

          files = sorted(
            glob.glob("instagram/*.jpg") + glob.glob("instagram/*.png") + glob.glob("instagram/*.webp"),
            reverse=True
          )[:12]

          posts = [{"src": f, "href": "https://instagram.com/cgonz313"} for f in files]

          with open("instagram/posts.json", "w") as fh:
            json.dump(posts, fh, indent=2)

          print(f"Wrote {len(posts)} posts to instagram/posts.json")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram/
          git diff --cached --quiet || git commit -m "Update Instagram posts"
          git push
